title: Tesla Smart Charge
views:
  - title: Smart Charge
    path: smart-charge
    icon: mdi:ev-station
    cards:
      - type: custom:apexcharts-card
        header:
          show: true
          title: Rates & Optimized Slots (24h)
          show_states: false
        graph_span: 24h
        span:
          start: hour
        all_series_config:
          stroke_width: 2
        yaxis:
          - id: price
            min: 0.1
            max: 0.4
          - id: soc
            opposite: true
            min: 20
            max: 100
        series:
          - entity: sensor.tesla_smart_charge_current_tariff_15m
            name: Electricity Rate
            type: line
            color: "#4FC3F7"
            show:
              legend_value: false
            yaxis_id: price
            float_precision: 3
            data_generator: >-
              return (entity.attributes.prices || []).map((p) => [new
              Date(p.start).getTime(), p.price]);
          - entity: sensor.tesla_smart_charge_active_charge_slots
            name: Primary Slots
            type: column
            color: "#66BB6A"
            show:
              legend_value: false
            yaxis_id: price
            opacity: 0.35
            data_generator: >-
              return (entity.attributes.schedule || []).filter((s) => s.enabled &&
              (s.stage || 'required') !== 'cheap_bonus').map((s) => [new
              Date(s.start).getTime(), s.price]);
          - entity: sensor.tesla_smart_charge_active_charge_slots
            name: Optimal Slots
            type: column
            color: "#FFA726"
            show:
              legend_value: false
            yaxis_id: price
            opacity: 0.45
            data_generator: >-
              return (entity.attributes.schedule || []).filter((s) => s.enabled &&
              (s.stage || 'required') === 'cheap_bonus').map((s) => [new
              Date(s.start).getTime(), s.price]);
          - entity: sensor.tesla_smart_charge_active_charge_slots
            name: Battery Level (%)
            type: line
            color: "#AB47BC"
            show:
              legend_value: false
            yaxis_id: soc
            float_precision: 1
            data_generator: >-
              return (entity.attributes.schedule || []).filter((s) => s.soc_end !== null
              && s.soc_end !== undefined).map((s) => [new Date(s.end ||
              s.start).getTime(), s.soc_end]);
      - type: markdown
        title: Charging Timeline
        content: |-
          {% set slots = state_attr('sensor.tesla_smart_charge_active_charge_slots', 'schedule') or [] %}
          {% set enabled = slots | selectattr('enabled', 'eq', true) | sort(attribute='start') | list %}
          {% if enabled | count == 0 %}
          No active charging slots.
          {% else %}
          {% set ns = namespace(groups=[], cur=None) %}
          {% for s in enabled %}
          {% set t = 'Optimal' if s.stage|default('required') == 'cheap_bonus' else 'Primary' %}
          {% if ns.cur is none %}
          {% set ns.cur = {'start': s.start, 'end': s.end, 'prices': [s.price|float(0)], 'type': t} %}
          {% elif s.start == ns.cur.end and t == ns.cur.type %}
          {% set ns.cur = {'start': ns.cur.start, 'end': s.end, 'prices': ns.cur.prices + [s.price|float(0)], 'type': ns.cur.type} %}
          {% else %}
          {% set ns.groups = ns.groups + [ns.cur] %}
          {% set ns.cur = {'start': s.start, 'end': s.end, 'prices': [s.price|float(0)], 'type': t} %}
          {% endif %}
          {% endfor %}
          {% if ns.cur is not none %}{% set ns.groups = ns.groups + [ns.cur] %}{% endif %}
          | Start | End | Avg. Rate (EUR/kWh) | Slots | Status |
          |---|---|---:|---:|---|
          {% for g in ns.groups[:16] %}
          | {{ as_local(as_datetime(g.start)).strftime('%d/%m %H:%M') }} | {{ as_local(as_datetime(g.end)).strftime('%H:%M') }} | {{ '%.3f'|format((g.prices | sum) / (g.prices | count)) }} | {{ g.prices | count }} | {{ g.type }} |
          {% endfor %}
          {% endif %}
      - type: entities
        title: Sensors
        show_header_toggle: false
        entities:
          - entity: sensor.tesla_smart_charge_next_best_rate
            name: Next Best Rate
          - entity: sensor.tesla_smart_charge_est_range_at_target_soc
            name: Est. Range at Target SOC
          - entity: sensor.tesla_smart_charge_total_estimated_cost
            name: Total Estimated Cost
          - entity: sensor.tesla_smart_charge_finish_time
            name: Finish Time
          - entity: sensor.tesla_smart_charge_energy_to_add
            name: Energy to Add
          - entity: sensor.tesla_smart_charge_active_charge_slots
            name: Active Charge Slots
          - entity: sensor.tesla_smart_charge_next_start_time
            name: Next Start Time
          - entity: sensor.tesla_smart_charge_energy_deficit
            name: Energy Deficit
          - entity: sensor.tesla_smart_charge_current_tariff_15m
            name: Current Tariff (15m)
      - type: entities
        title: Tesla Smart Controls
        entities:
          - entity: binary_sensor.tesla_smart_charge_smart_charging_status
          - entity: switch.tesla_smart_charge_enable_smart_charging
            name: Enable Smart Charging
          - entity: number.tesla_smart_charge_min_soc_at_ready_time
            name: Min. SOC at Ready Time
          - entity: number.tesla_smart_charge_departure_time
            name: Departure Time
          - entity: number.tesla_smart_charge_price_limit_threshold
            name: Price Limit Threshold
          - entity: number.tesla_smart_charge_target_soc_low_rate
            name: Target SOC (Low Rate)
      - type: custom:html-template-card
        title: false
        ignore_line_breaks: true
        content: >
            <style>
              .cs { font-family: sans-serif; padding: 12px 0; }
              .cs-head { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
              .cs-bolt { background:#E5FF3A; border-radius:6px; padding:4px 7px; font-size:16px; }
              .cs-title { font-size:17px; font-weight:700; color:var(--primary-text-color); }
              .cs-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
              .cs-stat { background:var(--card-background-color); border-radius:8px;
                          border:1px solid var(--divider-color); padding:8px 12px; }
              .cs-sl { font-size:10px; text-transform:uppercase; letter-spacing:.06em;
                        color:var(--secondary-text-color); margin-bottom:3px; }
              .cs-sv { font-size:15px; font-weight:600; color:var(--primary-text-color); font-family:monospace; }
              .cs-slab { font-size:10px; text-transform:uppercase; letter-spacing:.07em;
                          color:var(--secondary-text-color); margin-bottom:8px; font-weight:600; }
              table.cs-t { width:100%; border-collapse:collapse; font-size:12px; }
              table.cs-t th { text-align:left; color:var(--secondary-text-color); font-size:10px;
                              text-transform:uppercase; letter-spacing:.05em; padding:0 0 6px;
                              border-bottom:1px solid var(--divider-color); }
              table.cs-t td { padding:8px 0; border-bottom:1px solid var(--divider-color);
                              color:var(--primary-text-color); vertical-align:middle; }
              table.cs-t tr:last-child td { border-bottom:none; }
              .tm { font-family:monospace; font-size:12px; color:var(--secondary-text-color); }
              .pr { font-family:monospace; font-weight:600; }
              .slots-count { font-size:10px; color:var(--secondary-text-color); margin-left:2px; }
              .badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px;
                        text-transform:uppercase; letter-spacing:.04em; }
              .b-chg  { background:#E5FF3A33; color:#7a8800; border:1px solid #E5FF3A66; }
              .b-base { background:#3AE5C022; color:#0a7a60; border:1px solid #3AE5C066; }
              .b-oth  { background:var(--divider-color); color:var(--secondary-text-color); }
              .bar-bg { width:36px; height:3px; background:var(--divider-color); border-radius:2px;
                        display:inline-block; vertical-align:middle; margin-left:4px; }
              .bar-fg { height:100%; border-radius:2px; }
            </style>


            {% set all_slots = state_attr('sensor.tesla_smart_charge_active_charge_slots',
            'schedule') %}

            {% if all_slots %}

              {# --- 1. keep only enabled slots --- #}
              {% set slots = all_slots | selectattr('enabled', 'eq', true) | list %}

              {# --- 2. group contiguous slots (same stage, consecutive times) --- #}
              {# Jinja2 has no mutable vars, so we build a flat "group index" list first #}
              {% set ns = namespace(groups=[], cur=none) %}
              {% for s in slots %}
                {% if ns.cur is none
                      or s.stage != ns.cur.stage
                      or s.start != ns.cur.end %}
                  {# start a new group #}
                  {% set ns.cur = {'stage': s.stage, 'start': s.start, 'end': s.end,
                                  'prices': [s.price], 'soc_end': s.soc_end,
                                  'count': 1} %}
                  {% set ns.groups = ns.groups + [ns.cur] %}
                {% else %}
                  {# extend current group — rebuild dict (Jinja immutability workaround) #}
                  {% set updated = {'stage': ns.cur.stage, 'start': ns.cur.start, 'end': s.end,
                                    'prices': ns.cur.prices + [s.price],
                                    'soc_end': s.soc_end,
                                    'count': ns.cur.count + 1} %}
                  {% set ns.cur = updated %}
                  {# replace last element in groups #}
                  {% set ns.groups = ns.groups[:-1] + [updated] %}
                {% endif %}
              {% endfor %}

              {# --- 3. compute stats across grouped slots --- #}
              {% set all_prices = slots | map(attribute='price') | list %}
              {% set pmin = all_prices | min %}
              {% set pmax = all_prices | max %}
              {% set soc_min = slots | map(attribute='soc_end') | min %}
              {% set soc_max = slots | map(attribute='soc_end') | max %}

              <div class="cs">
                <div class="cs-head">
                  <div class="cs-bolt">&#9889;</div>
                  <div class="cs-title">Tesla Smart Charge Schedule</div>
                </div>

                <div class="cs-stats">
                  <div class="cs-stat">
                    <div class="cs-sl">Charging Slots</div>
                    <div class="cs-sv">{{ slots | count }}</div>
                  </div>
                  <div class="cs-stat">
                    <div class="cs-sl">Charge Sessions</div>
                    <div class="cs-sv">{{ ns.groups | count }}</div>
                  </div>
                  <div class="cs-stat">
                    <div class="cs-sl">Min Rate</div>
                    <div class="cs-sv">€{{ "%.5f" | format(pmin) }}</div>
                  </div>
                  <div class="cs-stat">
                    <div class="cs-sl">Max Rate</div>
                    <div class="cs-sv">€{{ "%.5f" | format(pmax) }}</div>
                  </div>
                  <div class="cs-stat" style="grid-column:1/-1">
                    <div class="cs-sl">SOC Forecast</div>
                    <div class="cs-sv">{{ soc_min }}% → {{ soc_max }}%</div>
                  </div>
                </div>

                <div class="cs-slab">Charging Timeline</div>
                <table class="cs-t">
                  <thead><tr>
                    <th>Start</th><th>End</th>
                    <th>Avg. Rate</th><th>SOC</th><th>Status</th>
                  </tr></thead>
                  <tbody>
                  {% for g in ns.groups %}
                    {% set avg = (g.prices | sum) / (g.prices | count) %}
                    {% set pct = ((avg - pmin) / (pmax - pmin) * 100) | round if pmax != pmin else 50 %}
                    {% set status_label = 'Optimal' if g.stage == 'cheap_bonus' else 'Primary' if g.stage in ['required', 'base', 'charge'] else g.stage %}
                    {% set badge_cls = 'b-chg' if g.stage == 'cheap_bonus' else 'b-base' if g.stage in ['required', 'base', 'charge'] else 'b-oth' %}
                    <tr>
                      <td class="tm">{{ g.start[11:16] }}</td>
                      <td class="tm">{{ g.end[11:16] }}</td>
                      <td>
                        <span class="pr">€{{ "%.4f" | format(avg) }}</span>
                        <span class="slots-count">{{ g.count }}×15m</span>
                        <span class="bar-bg"><span class="bar-fg"
                          style="width:{{ pct }}%;background:#E5FF3A"></span></span>
                      </td>
                      <td>{{ g.soc_end }}%</td>
                      <td><span class="badge {{ badge_cls }}">{{ status_label }}</span></td>
                    </tr>
                  {% endfor %}
                  </tbody>
                </table>
              </div>

            {% else %}
              <p style="color:var(--secondary-text-color);padding:1rem">
                No schedule data on sensor.tesla_smart_charge_active_charge_slots
              </p>
            {% endif %}
