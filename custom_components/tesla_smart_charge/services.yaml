reoptimize:
  name: Re-optimize schedule
  description: Force an immediate re-optimization and refresh.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id to target a single instance.
      example: "abcd1234"
apply_control:
  name: Apply control
  description: Apply the current optimized schedule to the charger switch now.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id to target a single instance.
      example: "abcd1234"
install_dashboard_template:
  name: Install dashboard template
  description: Copy the packaged Lovelace dashboard YAML to /config, or merge its view into an existing dashboard.
  fields:
    filename:
      name: Target filename
      description: Relative path under /config where the dashboard YAML is written.
      example: "dashboards/tesla_smart_charge.yaml"
    existing_dashboard_filename:
      name: Existing dashboard filename
      description: Relative path of an existing YAML dashboard file where the Tesla view is appended.
      example: "ui-lovelace.yaml"
